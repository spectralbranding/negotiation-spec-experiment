limitations:
  - id: L1
    description: >
      Reconstruction, not one-to-one replication: the scenarios and six condition prompts are
      our own construction, informed by the base study's public preprint and open data/code.
      Alignment with the base study is directional and conceptual within our own scenarios.
    severity: high
    addressable: true
  - id: L2
    description: >
      The base paper is observational; we make no causal claims about it. Our causal claims are
      internal to our own randomized condition assignment.
    severity: moderate
    addressable: false
  - id: L3
    description: >
      The expected-value and paraphrase-envelope measures are exploratory (amendment-logged);
      the paraphrase joint value is not comparable to the round-robin.
    severity: minor
    addressable: true
  - id: L4
    description: >
      The primary mixed model was singular on this design; analysis fell back to the
      preregistered OLS cluster-robust standard errors. Reported transparently.
    severity: minor
    addressable: true
  - id: L5
    description: >
      On the mid-capability model the warmth manipulation bleeds into dominance; stylistic
      prompts bleed across affective dimensions in weaker models, whereas specification prompts
      cleanly decouple style from objective optimization. The bleed is absent at the frontier.
    severity: moderate
    addressable: true

