spec_version: 0.1.0
meta:
  title: Value Headroom Moderates Whether Specification Beats Style in LLM Negotiation
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.20595996
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  abstract: When two language-model agents negotiate, does it matter more how they are *styled* (warm,
    dominant) or how their objective is *specified* (ranked priorities, a reservation value, a concession
    rule)? A large autonomous-negotiation study reported that interpersonal warmth, not structure, predicted
    success. This note offers an independent test — a reconstruction from that study's public materials,
    not a one-to-one reproduction — and identifies *value headroom* (the joint surplus a naively cooperative
    pair leaves on the table) as a first-order moderator. Across seven arms spanning three model families
    (4,920 dyads), specification-first prompting ties interpersonal style on near-ceiling scenarios (a
    preregistered null) but yields strictly higher joint value once headroom is present (Cohen *d* = .314,
    *p* = .009 on a mid-capability model; *d* = .569, *p* < .001 at the frontier — the advantage grows
    with capability), with a graded design confirming the headroom slope. An ablation shows the advantage
    comes from teaching logrolling, not leaking the payoff matrix; it survives prompt paraphrase and replicates
    across model families. Specification moves the objective value frontier while remaining affectively
    neutral; style games the agreement proxy. The apparent "style beats structure" result is recovered
    as the zero-headroom boundary case of a more general law.
claims:
- id: P1
  type: proposition
  statement: 'Value headroom is a first-order moderator of prompt-type efficacy: above a modest headroom
    threshold, specification-first prompting yields strictly higher expected joint value than interpersonal-style
    prompting, while at the ceiling the two are indistinguishable on value.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: SPEC's value advantage is produced by a TAUGHT integrative procedure (logrolling — seek asymmetric
    cross-issue trades), not by exposure/leakage of the payoff matrix; the ranked-weight spec alone, without
    the logrolling clause, does not beat cooperative controls.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P3
  type: proposition
  statement: 'Structure scaffolds rather than washes out at the frontier: the specification advantage
    grows with model capability and the cleaner model separates the style manipulations more sharply (no
    warmth/dominance bleed).'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P4
  type: proposition
  statement: 'Deal and value are distinct objectives current LLMs optimize differently under prompting:
    interpersonal style games the deal/agreement proxy (and can bleed across affective dimensions) while
    specification moves the objective value frontier; warmth is sufficient-not-necessary for cooperative
    outcomes and never tops expected value.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P5
  type: proposition
  statement: The base paper's 'warmth, not structure' result is recovered as the headroom→0 boundary case
    of P1 — a directional/conceptual consistency with that observational finding, not a contradiction
    of it and not a 1:1 reproduction of its design.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
methodology:
  type: mixed
  design: 'Dyadic negotiation harness: round-robin condition grid x scenarios x 2 role orders x replicates;
    structured OFFER/ACCEPT protocol; payoff cards + reservation injected at turn level; deal parsing
    + value_created/value_claimed computed from agreed terms. Two-scorer warmth/dominance + SVI rating
    cascade (gpt-4o + claude-haiku-4-5, temp 0, rubric v2.1 with 0/25/50/75/100 anchors); inter-scorer
    ICC(2,1) reported per arm. Pre-specified Welch t-test contrasts per condition pair on value_created
    (integrative only), value_claimed, deal rate; effect sizes Cohen''s d; exact p (3 digits, no leading
    zero, p<.001 floor). Primary mixed model fell back to OLS cluster-robust SE (MixedLM singular on this
    design — documented).'
  analysis:
    software: code/run_experiment.py + code/negotiation_runner.py + code/outcomes.py
acceptance:
- claim_id: P1
  criterion: 'Holds if value headroom is a first-order moderator of prompt-type efficacy: above a modest
    headroom threshold, specification-first prompting yields strictly higher expected joint value than
    interpersonal-style prompting, while at the ceiling the two are indistinguishable on value.'
  falsification: A monotone-or-null SPEC advantage that does NOT depend on headroom (same sign/size at
    ceiling and with headroom) refutes P1.
- claim_id: P2
  criterion: Holds if sPEC's value advantage is produced by a TAUGHT integrative procedure (logrolling
    — seek asymmetric cross-issue trades), not by exposure/leakage of the payoff matrix; the ranked-weight
    spec alone, without the logrolling clause, does not beat cooperative controls.
  falsification: F4 inverted (SPEC_NOLOGROLL still beats controls) would refute P2.
- claim_id: P3
  criterion: 'Holds if structure scaffolds rather than washes out at the frontier: the specification advantage
    grows with model capability and the cleaner model separates the style manipulations more sharply (no
    warmth/dominance bleed).'
  falsification: A shrinking-to-zero SPEC advantage as capability rises (strong models find the logroll
    unaided) would refute P3 and support a high-capability ceiling instead.
- claim_id: P4
  criterion: 'Holds if deal and value are distinct objectives current LLMs optimize differently under
    prompting: interpersonal style games the deal/agreement proxy (and can bleed across affective dimensions)
    while specification moves the objective value frontier; warmth is sufficient-not-necessary for cooperative
    outcomes and never tops expected value.'
  falsification: If warmth topped expected value in any arm with headroom, the deal-vs-value separation
    would not hold.
- claim_id: P5
  criterion: Holds if the base paper's 'warmth, not structure' result is recovered as the headroom→0 boundary
    case of P1 — a directional/conceptual consistency with that observational finding, not a contradiction
    of it and not a 1:1 reproduction of its design.
  falsification: If our ceiling regime did NOT recover the style-over-structure pattern, the boundary-case
    account fails.
