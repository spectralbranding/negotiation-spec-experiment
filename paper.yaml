paper_spec_version: "0.1.0"

metadata:
  title: "Value Headroom Moderates Whether Specification Beats Style in LLM Negotiation"
  authors:
    - name: "Dmitry Zharnikov"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
      corresponding: true
  citation_key: "negotiation_spec_2026"
  doi: "10.5281/zenodo.20595996"
  date: "2026-06-09"
  version: "1.0.0"
  status: preprint
  license: "CC-BY-4.0"  # paper text CC-BY-4.0; companion code MIT
  abstract: >
    When two language-model agents negotiate, does it matter more how they are styled
    (warm, dominant) or how their objective is specified (ranked priorities, a reservation
    value, a concession rule)? A large autonomous-negotiation study reported that
    interpersonal warmth, not structure, predicted success. This note offers an independent
    test --- a reconstruction from that study's public materials, not a one-to-one
    reproduction --- and identifies value headroom (the joint surplus a naively cooperative
    pair leaves on the table) as a first-order moderator. Across seven arms spanning three
    model families (4,920 dyads), specification-first prompting ties interpersonal style on
    near-ceiling scenarios (a preregistered null) but yields strictly higher joint value
    once headroom is present (Cohen d = .314, p = .009 on a mid-capability model; d = .569,
    p < .001 at the frontier --- the advantage grows with capability), with a graded design
    confirming the headroom slope. An ablation shows the advantage comes from teaching
    logrolling, not leaking the payoff matrix; it survives prompt paraphrase and replicates
    across model families. Specification moves the objective value frontier while remaining
    affectively neutral; style games the agreement proxy. The apparent "style beats
    structure" result is recovered as the zero-headroom boundary case of a more general law.
  keywords:
    - LLM negotiation
    - value creation
    - logrolling
    - prompt specification
    - integrative bargaining
    - agentic AI
    - value headroom
    - dose-response

claims:
  - id: P1
    type: proposition
    statement: >
      Value headroom is a first-order moderator of prompt-type efficacy: above a modest
      headroom threshold, specification-first prompting yields strictly higher expected
      joint value than interpersonal-style prompting, while at the ceiling the two are
      indistinguishable on value.
    testable: true
    tested_in_paper: true
    status: supported  # null at ceiling (Study 1) contrasted with SPEC win with headroom (Study 2); graded slope confirms
    falsification: >
      A monotone-or-null specification advantage that does NOT depend on headroom (same sign
      and size at the ceiling and with headroom) refutes P1.
    depends_on: []

  - id: P2
    type: proposition
    statement: >
      The specification value advantage is produced by a taught integrative procedure
      (logrolling --- seek asymmetric cross-issue trades), not by exposure or leakage of the
      payoff matrix; the ranked-weight specification alone, without the logrolling clause,
      does not beat cooperative controls.
    testable: true
    tested_in_paper: true
    status: supported  # one-sentence ablation collapses the advantage to control level
    falsification: >
      If SPEC_NOLOGROLL (ranked-weight specification minus the cross-issue-trade clause) still
      beat cooperative controls, the leakage rival would be supported and P2 refuted.
    depends_on: [P1]

  - id: P3
    type: proposition
    statement: >
      Structure scaffolds rather than washes out at the frontier: the specification advantage
      grows with model capability and the stronger model separates the style manipulations more
      sharply (no warmth/dominance bleed).
    testable: true
    tested_in_paper: true
    status: supported  # frontier d = .569 > mid-capability d = .314; cross-family replication
    falsification: >
      A shrinking-to-zero specification advantage as capability rises (strong models find the
      logroll unaided) would refute P3 and support a high-capability ceiling instead.
    depends_on: [P1]

  - id: P4
    type: proposition
    statement: >
      Deal and value are distinct objectives that current LLMs optimize differently under
      prompting: interpersonal style games the deal/agreement proxy (and can bleed across
      affective dimensions) while specification moves the objective value frontier; warmth is
      sufficient-not-necessary for cooperative outcomes and never tops expected value.
    testable: true
    tested_in_paper: true
    status: supported  # expected-value measure: warmth never tops; dominance deal-vs-value asymmetry
    falsification: >
      If warmth topped expected value in any arm with headroom, the deal-versus-value
      separation would not hold and P4 would be refuted.
    depends_on: [P1]

  - id: P5
    type: proposition
    statement: >
      The base paper's "warmth, not structure" result is recovered as the headroom-to-zero
      boundary case of P1 --- a directional and conceptual consistency with that observational
      finding, not a contradiction of it and not a one-to-one reproduction of its design.
    testable: true
    tested_in_paper: true
    status: supported  # boundary-case recovery: the ceiling regime reproduces style-over-structure
    falsification: >
      If the near-ceiling regime did NOT recover the style-over-structure pattern, the
      boundary-case account fails.
    depends_on: [P1]

methodology:
  type: empirical
  design: >
    Seven arms across three model families, 4,920 dyads total. Study 1 (gpt-class
    mid-capability model, three near-ceiling scenarios, ~3% headroom, 630 dyads): the
    preregistered near-ceiling null. Study 2 (same model, three harder scenarios, 31-46%
    headroom, 630 dyads): specification wins on joint value. Haiku cross-family arm
    (claude-haiku-4-5, Study-1 scenarios, 630 dyads): the core null replicates in a second
    family. Logrolling ablation (full 7-condition grid including SPEC_NOLOGROLL, 560 dyads):
    removing only the cross-issue-trade sentence collapses the advantage. Frontier arm
    (grok-4.3, full Study-2 grid, 630 dyads): the specification advantage grows with
    capability. Paraphrase envelope (gpt-class model, four focal conditions x five wordings
    vs a pinned neutral opponent, 640 dyads): manipulation purity holds across wordings.
    Graded headroom dose-response (gpt-class model, five retuned scenario variants across
    NEUTRAL/COT_ONLY/SPEC_NOCOT, 1,200 dyads): a positive specification x realized-headroom
    interaction. All hypotheses are evaluated at the dyad level.
  sample:
    size: 4920  # Study1 630 + Study2 630 + Haiku 630 + ablation 560 + frontier 630 + paraphrase 640 + headroom 1200
    description: >
      4,920 dyads across seven arms and three model families (gpt-4o-mini, claude-haiku-4-5,
      grok-4.3 as players). Study 1 (630), Study 2 (630), Haiku cross-family (630), logrolling
      ablation full grid (560), frontier (630), paraphrase envelope (640), graded headroom
      dose-response (1,200). Full negotiation transcripts archived as a HuggingFace dataset,
      DOI 10.57967/hf/9090.
  instrument: >
    Dyadic negotiation harness: a round-robin condition grid x scenarios x two role orders x
    replicates, with a structured OFFER/ACCEPT protocol, per-agent numeric payoff cards and
    reservation values injected at the turn level, and value_created / value_claimed computed
    from agreed terms. A two-scorer warmth/dominance + subjective-value-inventory rating
    cascade (one OpenAI scorer, one Anthropic scorer, temperature zero, behaviorally anchored
    rubric) provides manipulation checks; inter-scorer ICC(2,1) is reported per arm.
  measures:
    - variable: "value_created"
      instrument: "Joint points of the agreed bundle (integrative scenarios only)"
    - variable: "value_claimed"
      instrument: "Own surplus above the reservation value"
    - variable: "deal_rate"
      instrument: "Fraction of dyads reaching a parsed agreement"
    - variable: "expected_value"
      instrument: "Unconditional EV = deal_rate x value_if_deal (no-deal scored zero); corrects conditional-on-deal selection"
    - variable: "inter_scorer_ICC"
      instrument: "ICC(2,1) of the two scorer models on warmth and dominance, per arm (>.80 throughout)"
  analysis:
    primary:
      - "Pre-specified Welch t-test contrasts per condition pair on value_created, value_claimed, deal rate; Cohen's d alongside every test"
      - "Preregistered OLS cluster-robust SE fallback (primary MixedLM singular on this design --- documented)"
      - "Pre-specified specification x realized-headroom interaction (graded dose-response)"
    secondary:
      - "Unconditional expected-value re-analysis across arms"
      - "Prompt-paraphrase manipulation-purity envelope"
    software: "Python 3.12, scipy, numpy, statsmodels"
  tools:
    - "gpt-4o-mini (player; experiment subject)"
    - "claude-haiku-4-5 (player; experiment subject)"
    - "grok-4.3 (player; experiment subject)"
    - "gpt-4o (manipulation-check scorer)"
    - "claude-haiku-4-5 (manipulation-check scorer)"
    - "Python 3.12 (harness, scoring, analysis)"

