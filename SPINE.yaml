# ---------------------------------------------------------------------------
# Methods
# ---------------------------------------------------------------------------
methods:
  - id: M1
    statement: "Dyadic negotiation harness: round-robin condition grid x scenarios x 2 role orders x replicates; structured OFFER/ACCEPT protocol; payoff cards + reservation injected at turn level; deal parsing + value_created/value_claimed computed from agreed terms."
    type: "computation"
    inputs: [O1, O2, O3, O4, O5, O6, O7]
    code_anchor: "code/run_experiment.py + code/negotiation_runner.py + code/outcomes.py"
    reproducibility:
      seed: "temp .20 (sampling); deterministic outcome computation; LLM clients timeout=90,max_retries=3"
      version: "git: feature/negotiation-spec-study2"
    provenance: {created_by: "author", created_at: "2026-06-06", source_log_event: "EXPERIMENT_DESIGN.md"}
    body_sections: ["Method"]
  - id: M2
    statement: "Two-scorer warmth/dominance + SVI rating cascade (gpt-4o + claude-haiku-4-5, temp 0, rubric v2.1 with 0/25/50/75/100 anchors); inter-scorer ICC(2,1) reported per arm."
    type: "ai_invocation"
    inputs: [O1, O2, O3, O4, O5, O6]
    code_anchor: "code/scoring_llm.py + code/compute_icc.py"
    provenance: {created_by: "author", created_at: "2026-06-06", source_log_event: "PILOT_GATE_AUDIT.md Gate 3"}
    body_sections: ["Method — Manipulation checks"]
  - id: M3
    statement: "Pre-specified Welch t-test contrasts per condition pair on value_created (integrative only), value_claimed, deal rate; effect sizes Cohen's d; exact p (3 digits, no leading zero, p<.001 floor). Primary mixed model fell back to OLS cluster-robust SE (MixedLM singular on this design — documented)."
    type: "statistical_analysis"
    inputs: [O1, O2, O3, O4, O5, O6, O7]
    code_anchor: "code/analyze.py"
    provenance: {created_by: "author", created_at: "2026-06-06", source_log_event: "PREREGISTRATION.md §4 + PREREGISTRATION_STUDY2.md"}
    body_sections: ["Method — Analysis"]
  - id: M4
    statement: "Unconditional expected-value measure EV = mean(value_created if deal else 0) per condition — corrects conditional-on-deal selection bias. Exploratory (amendment-logged), not confirmatory."
    type: "statistical_analysis"
    inputs: [O1, O2, O3, O5]
    code_anchor: "code/analyze.py (expected_value block)"
    provenance: {created_by: "author", created_at: "2026-06-07", source_log_event: "results summary Counter-measure"}
    body_sections: ["Results — Expected value (robustness)"]

# ---------------------------------------------------------------------------
# Findings — what is the case (SSOT numbers: results summary)
# ---------------------------------------------------------------------------
findings:
  - id: F1
    statement: "At the value ceiling (Study 1), SPEC_NOCOT ties every cooperative control on value created (SPEC_NOCOT-NEUTRAL +5.07, d=.049, p=.683; -COT_ONLY d=-.030; -WARMTH d=.019). Warmth does not lift value. This is the preregistered NULL."
    source_method: M3
    antecedents: [O1, M1, M3]
    statistical_strength: "preregistered confirmatory null; N=630 dyads; deal rate .844"
    conditions: "C1, C3, C4; ceiling regime (NEUTRAL already ~641/658)"
    falsifier: "If SPEC beat cooperative controls on value created at <5% headroom, the ceiling account fails."
    citation_role: ["motivation_for_P1"]
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-06", source_log_event: "results summary Arm A"}
    body_sections: ["Results — Study 1"]
  - id: F2
    statement: "With headroom (Study 2), SPEC wins on value created: SPEC_NOCOT-NEUTRAL +54.24, d=.314, p=.009; SPEC_NOCOT-WARMTH +43.69, d=.263, p=.029; SPEC_COT-WARMTH +56.77, d=.346, p=.004. WARMTH-NEUTRAL d=.058, p=.629 (warmth does not lift value). Deal rate SPEC_NOCOT-NEUTRAL +.11, d=.293, p=.003."
    source_method: M3
    antecedents: [O2, M1, M3]
    statistical_strength: "confirmatory; N=630; ICC warmth .840 / dominance .911"
    conditions: "C1, C3, C4; headroom 31-46%"
    falsifier: "If SPEC tied controls on value created at 31-46% headroom, the headroom-moderation claim fails."
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-06", source_log_event: "results summary Arm B"}
    body_sections: ["Results — Study 2"]
  - id: F3
    statement: "Core null replicates cross-family (haiku): SPEC_NOCOT ties controls on value in the easy regime (SPEC_NOCOT-COT_ONLY d=.010, p=.930; WARMTH-NEUTRAL d=.007). New model-dependent thread: SPEC_COT beats COT/WARMTH strongly even on easy scenarios (SPEC_COT-COT_ONLY d=.507, p<.001; -WARMTH d=.744, p<.001). DOMINANCE penalty much milder on haiku (deal d=-.32 vs gpt -.93; value not cratered)."
    source_method: M3
    antecedents: [O3, M1, M3]
    statistical_strength: "N=630; ICC warmth .850 / dominance .850"
    conditions: "C1, C3, C4; easy regime, second model family"
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-07", source_log_event: "results summary Arm C"}
    body_sections: ["Results — Cross-family"]
  - id: F4
    statement: "Logrolling ablation (full-grid, matched baseline NEUTRAL value 780): removing ONLY the logrolling sentence collapses SPEC's advantage. SPEC_NOCOT-SPEC_NOLOGROLL +55.0 value-created, d=.353, p=.002 (+50.9 value-claimed, d=.318, p=.005). SPEC_NOLOGROLL-NEUTRAL d=.106, p=.342 (ns) and -COT_ONLY d=.156, p=.163 (ns): it falls back to the control level. On OWN value SPEC_NOLOGROLL underperforms NEUTRAL (d=-.23, p=.044) — concede-low without seek-trades-back makes a systematic conceder."
    source_method: M3
    antecedents: [O4, M1, M3]
    statistical_strength: "confirmatory directional; N=560; ICC warmth .822 / dominance .801"
    conditions: "C1, C3, C4; SPEC_NOLOGROLL retains full ranked-weight payoff spec, drops only the cross-issue-trade clause"
    falsifier: "If SPEC_NOLOGROLL retained SPEC_NOCOT's advantage (still beat controls), the leak rival would be supported, not strategy."
    citation_role: ["rules_out_A1"]
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-08", source_log_event: "results summary Ablation; commit 028b08da"}
    body_sections: ["Results — Mechanism: strategy not leakage"]
  - id: F5
    statement: "At the frontier (grok-4.3), the SPEC advantage GROWS: SPEC_NOCOT-NEUTRAL +70.9, d=.569, p<.001 (vs gpt-4o-mini .314); -COT_ONLY d=.571; -WARMTH d=.687. WARMTH-NEUTRAL d=-.126 (ns). ICC warmth .894 / dominance .855. The gpt-4o-mini warmth/dominance bleed is gone (WARMTH dominance 6.8 vs DOMINANCE 44.9)."
    source_method: M3
    antecedents: [O5, M1, M3]
    statistical_strength: "exploratory capability probe; N=630; cleanest manipulation separation"
    conditions: "C1, C3, C4; frontier capability"
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-08", source_log_event: "results summary Frontier"}
    body_sections: ["Results — Capability scaling"]
  - id: F6
    statement: "Manipulation purity holds across all 5 paraphrases of every focal condition: WARMTH paraphrases warmth ~85-88; SPEC paraphrases warmth ~9-11 AND dominance ~7-9 (low-low); COT_ONLY ~6-8/~0. The effects are not a single-phrasing artifact."
    source_method: M2
    antecedents: [O6, M2]
    statistical_strength: "exploratory robustness envelope; N=640"
    conditions: "C3; CAVEAT — focal-vs-pinned-NEUTRAL joint value is a different quantity than the round-robin; do not cross-compare condition ranks"
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-08", source_log_event: "results summary Paraphrase"}
    body_sections: ["Results — Wording robustness"]
  - id: F7
    statement: "Unconditional expected value (deal_rate x value_if_deal): SPEC (esp. SPEC_COT) tops every arm; DOMINANCE bottom/near-bottom everywhere (deal-rate drag); WARMTH never tops it (buys deals, cedes value, nets mid-pack). Frontier EV: SPEC_NOCOT 967 / SPEC_COT 942 top; DOMINANCE 694 bottom."
    source_method: M4
    antecedents: [O1, O2, O3, O5, M4]
    statistical_strength: "exploratory unifying measure across arms"
    conditions: "C1; corrects conditional-on-deal selection"
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-07", source_log_event: "results summary Counter-measure"}
    body_sections: ["Results — Expected value (robustness)"]
  - id: F8
    statement: "DOMINANCE craters deal rate across ALL models (gpt Study1 deal d~-.93; Study2 SPEC-DOMINANCE deal d=.935; frontier DOMINANCE-NEUTRAL deal d=-.413, p<.001) but craters VALUE only on gpt-4o-mini; haiku + grok spare value. Model-specific on value, universal on deal rate."
    source_method: M3
    antecedents: [O1, O2, O3, O5, M3]
    statistical_strength: "secondary negative control across arms"
    conditions: "C2, C3; DOMINANCE is the negative control"
    provenance: {created_by: "tool:analyze.py", created_at: "2026-06-08", source_log_event: "results summary Synthesis"}
    body_sections: ["Results — Dominance (secondary control)"]

# ---------------------------------------------------------------------------
# Propositions — why is it the case (the theoretical claims)
# ---------------------------------------------------------------------------
propositions:
  - id: P1
    statement: "Value headroom is a first-order moderator of prompt-type efficacy: above a modest headroom threshold, specification-first prompting yields strictly higher expected joint value than interpersonal-style prompting, while at the ceiling the two are indistinguishable on value."
    type: empirical_finding
    conditions: "C1, C2, C3, C4"
    antecedents: [F1, F2, F7]
    assumptions: [AA1, AA2]
    falsifier: "A monotone-or-null SPEC advantage that does NOT depend on headroom (same sign/size at ceiling and with headroom) refutes P1."
    evidence:
      - type: log_anchor
        anchor: "F1 (null at ceiling) contrasted with F2 (SPEC wins with headroom); EV unifies (F7)"
      - type: citation
        anchor: "value-creating vs value-claiming distinction"
        citation_keys: [walton-mckersie-1965-behavioral-theory-labor-negotiations, lax-sebenius-1986-manager-as-negotiator, raiffa-1982-art-science-negotiation]
        citation_role: theoretical_predecessor
    ruled_out_rivals: [A1, A2, A3]
    body_sections: ["Discussion — Headroom as first-order moderator", "Intro"]
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "pre-draft review"}
  - id: P2
    statement: "SPEC's value advantage is produced by a TAUGHT integrative procedure (logrolling — seek asymmetric cross-issue trades), not by exposure/leakage of the payoff matrix; the ranked-weight spec alone, without the logrolling clause, does not beat cooperative controls."
    type: empirical_finding
    conditions: "C1, C3"
    antecedents: [F4]
    falsifier: "F4 inverted (SPEC_NOLOGROLL still beats controls) would refute P2."
    evidence:
      - type: log_anchor
        anchor: "F4 ablation: -1 sentence collapses the advantage to control level; own-value conceder result"
      - type: citation
        anchor: "logrolling / integrative trades as the value-creation mechanism"
        citation_keys: [pruitt-1981-negotiation-behavior, walton-mckersie-1965-behavioral-theory-labor-negotiations]
        citation_role: definitional_source
    ruled_out_rivals: [A1]
    body_sections: ["Discussion — Mechanism", "Results — Mechanism"]
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "EXTENSION_DESIGN.md §1"}
  - id: P3
    statement: "Structure scaffolds rather than washes out at the frontier: the specification advantage grows with model capability and the cleaner model separates the style manipulations more sharply (no warmth/dominance bleed)."
    type: empirical_finding
    conditions: "C1, C2, C3"
    antecedents: [F5, F3]
    falsifier: "A shrinking-to-zero SPEC advantage as capability rises (strong models find the logroll unaided) would refute P3 and support a high-capability ceiling instead."
    evidence:
      - type: log_anchor
        anchor: "F5 grok d=.569 > gpt-4o-mini .314; F3 cross-family replication of the null + spec×CoT"
      - type: citation
        anchor: "contemporaneous LLM-negotiation capability findings"
        citation_keys: [negotiationarena-2024, bhattacharya-2025-evaluating-negotiation-llms]
        citation_role: contrast_case
    body_sections: ["Discussion — Capability scaling"]
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "results summary Synthesis 3"}
  - id: P4
    statement: "Deal and value are distinct objectives current LLMs optimize differently under prompting: interpersonal style games the deal/agreement proxy (and can bleed across affective dimensions) while specification moves the objective value frontier; warmth is sufficient-not-necessary for cooperative outcomes and never tops expected value."
    type: ontological
    conditions: "C1, C2, C3"
    antecedents: [F2, F7, F8, F6]
    assumptions: [AA3]
    falsifier: "If warmth topped expected value in any arm with headroom, the deal-vs-value separation would not hold."
    evidence:
      - type: log_anchor
        anchor: "F7 EV (warmth never tops); F8 dominance deal-vs-value asymmetry; F6 SPEC clean decoupling; warmth suff-not-nec across arms"
      - type: citation
        anchor: "warmth/competence + value-claim vs value-create"
        citation_keys: [curhan-2006-svi, lax-sebenius-1986-manager-as-negotiator]
        citation_role: theoretical_predecessor
    body_sections: ["Discussion — Deal vs value", "Results — Dominance"]
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "pre-draft review keep (EV measure)"}
  - id: P5
    statement: "The base paper's 'warmth, not structure' result is recovered as the headroom→0 boundary case of P1 — a directional/conceptual consistency with that observational finding, not a contradiction of it and not a 1:1 reproduction of its design."
    type: rendering_equivalence
    conditions: "C1, C3"
    antecedents: [F1, P1]
    falsifier: "If our ceiling regime did NOT recover the style-over-structure pattern, the boundary-case account fails."
    evidence:
      - type: citation
        anchor: "base paper observational AI-negotiation finding (public preprint)"
        citation_keys: [vaccaro-2026-advancing-ai-negotiations]
        citation_role: motivating_problem
    body_sections: ["Intro", "Discussion — Relation to prior work"]
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "results summary reconstruction disclosure"}

# Dose-response derivation (result pending — see RC3)
derivations:
  - id: D1
    statement: "If P1 holds, SPEC's value advantage should rise monotonically with realized headroom within a single scenario family (a positive spec×headroom interaction), not merely flip sign between two scenario sets."
    from: [P1]
    to: "RC3 prediction"
    reasoning_type: "deductive"
    formal_proof_anchor: "code/gen_headroom_variants.py (graded design)"
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "EXTENSION_DESIGN.md §3"}
    body_sections: ["Results — Dose-response"]

# ---------------------------------------------------------------------------
# Alternative explanations (rivals)
# ---------------------------------------------------------------------------
alternative_explanations:
  - id: A1
    statement: "SPEC wins because naming weights + logrolling effectively hands the agent the payoff-matrix structure (information leakage), so any agent told the structure wins regardless of taught strategy."
    rules_out_required: [F4]
    ruled_out_by: [F4]
    rules_out_status: "rejected"
    reasoning: "SPEC_NOLOGROLL retains the full ranked-weight payoff spec and loses ONLY the cross-issue-trade clause, yet collapses to control level (F4). The active ingredient is the integrative instruction, not matrix exposure."
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "results summary Ablation"}
    body_sections: ["Results — Mechanism"]
  - id: A2
    statement: "The SPEC advantage is an artifact of one exact prompt wording (p-hacked phrasing)."
    rules_out_required: [F6]
    ruled_out_by: [F6]
    rules_out_status: "rejected"
    reasoning: "Manipulation purity + effect survive across 5 semantically-equivalent paraphrases of each focal condition (F6)."
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "results summary Paraphrase"}
    body_sections: ["Results — Wording robustness"]
  - id: A3
    statement: "The whole pattern is a single-model (gpt-4o-mini) artifact."
    rules_out_required: [F3, F5]
    ruled_out_by: [F3, F5]
    rules_out_status: "rejected"
    reasoning: "The core null replicates on haiku (F3) and the SPEC advantage strengthens on grok-4.3 (F5) — three families, same direction."
    provenance: {created_by: "author", created_at: "2026-06-08", source_log_event: "results summary Synthesis 3"}
    body_sections: ["Results — Cross-family", "Results — Capability scaling"]

