# ---------------------------------------------------------------------------
# Negative finding / limitations / assumptions
# ---------------------------------------------------------------------------
negative_findings:
  - id: NF1
    statement: "At <5% headroom there is NO detectable value advantage of specification over cooperative style (the preregistered Study-1 null) — an informative absence that locates the boundary, not a failed experiment."
    expected_observation: "A SPEC>controls value gap if structure helped unconditionally."
    source_method: M3
    affects_nodes: [P1, P5]
    motivates: [P1]
    provenance: {created_by: "author", created_at: "2026-06-06", source_log_event: "F1"}
    body_sections: ["Results — Study 1", "Discussion"]

limitations:
