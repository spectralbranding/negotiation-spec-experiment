spine_version: "0.2"
paper_key: "negotiation_spec_2026"
title: "Value Headroom Moderates Whether Specification Beats Style in LLM Negotiation"
thesis: |
  Value headroom — how much joint surplus a naively cooperative pair leaves on the
  table — is a first-order moderator of prompt-type efficacy in dyadic LLM negotiation.
  Interpersonal style (warmth) dominates structural specification only when joint-value
  headroom approaches zero; above a modest headroom threshold, specification-first
  prompting produces strictly higher expected value while remaining affectively neutral.
  The specification advantage (1) is mechanistically due to a taught integrative
  procedure — logrolling — not to leakage of the payoff matrix; (2) is robust to prompt
  paraphrase; (3) grows with model capability; and (4) replicates across model families.
  This reframes an apparent "style beats structure" result reported on near-ceiling
  scenarios as a boundary case of a more general headroom-dependent law.

# ---------------------------------------------------------------------------
# Boundary conditions (cannot be relaxed — theory does not apply outside them)
# ---------------------------------------------------------------------------
boundary_conditions:
  - id: C1
    statement: "Integrative scenarios with quantifiable joint value (value_created defined); excludes pure single-issue distributive bargaining where joint surplus is constant."
  - id: C2
    statement: "Dyadic LLM-vs-LLM negotiation with each agent given its own published numeric payoff card + reservation value at the harness level."
  - id: C3
    statement: "Prompt-type contrast as operationalized: SPEC (specification-first), WARMTH/DOMINANCE (style), NEUTRAL (floor), COT_ONLY (structure-without-spec) condition bodies, frozen + hashed."
  - id: C4
    statement: "Hypotheses evaluated at the DYAD level (one negotiation = one unit); agent-level style scores enter only as manipulation checks."

